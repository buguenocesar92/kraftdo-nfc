version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.simple
    container_name: kraftdo-simple
    ports:
      - "8080:80"
    volumes:
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080
      - ASSET_URL=http://localhost:8080
      - LIVEWIRE_ASSET_URL=http://localhost:8080
      # Database Externa
      - DB_CONNECTION=mysql
      - DB_HOST=192.168.100.20
      - DB_PORT=3306
      - DB_DATABASE=kraftdo
      - DB_USERNAME=docker
      - DB_PASSWORD=Hero2025.
      - DB_SSLMODE=DISABLED
      # Redis
      - REDIS_HOST=redis
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      # Session config para Docker
      - SESSION_DOMAIN=localhost
      - SESSION_SECURE_COOKIE=false
      - SESSION_SAME_SITE=lax
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: kraftdo-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:

networks:
  default:
    name: kraftdo-network