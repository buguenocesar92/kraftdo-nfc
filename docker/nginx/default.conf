server {
    listen 8080;
    server_name nfc.kraftdo.com _;
    root /var/www/html/public;
    index index.php index.html;

    # Security optimizado
    server_tokens off;
    
    # Headers para proxy reverso
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;
    
    # Rate limiting estricto para producción
    limit_req zone=general burst=10 nodelay;
    limit_conn perip 20;
    
    # Laravel public directory - configuración específica para URLs limpias
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Metrics endpoint (protegido)
    location /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        try_files $uri /index.php?$query_string;
    }

    # PHP-FPM con configuración específica para Laravel
    location ~ \.php$ {
        # No permitir acceso directo a archivos PHP que no sean index.php
        location ~ ^/(?!index\.php$).+\.php$ {
            return 404;
        }
        
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Headers críticos para Laravel - pasados a través de FastCGI
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param SERVER_NAME $host;
        
        # Configurar HTTPS correctamente si es necesario
        fastcgi_param HTTPS $https if_not_empty;
        
        # Security
        fastcgi_hide_header X-Powered-By;
        
        # Timeouts optimizados para producción
        fastcgi_read_timeout 120;
        fastcgi_send_timeout 120;
        fastcgi_connect_timeout 30;
        
        # Buffer sizes optimizados
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
        fastcgi_busy_buffers_size 32k;
    }

    # Static files caching agresivo para producción
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        log_not_found off;
    }
    
    # CSS y JS con versionado
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        
        # Compresión adicional
        gzip_static on;
    }

    # Storage files (uploaded content)
    location ~* ^/storage/(.+\.(jpg|jpeg|png|gif|svg|mp3|mp4|wav|pdf))$ {
        expires 1M;
        add_header Cache-Control "public";
        access_log off;
    }

    # Security: deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(storage/app|storage/framework|storage/logs|bootstrap/cache) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # NFC endpoint optimization (high traffic)
    location /nfc {
        # Rate limiting específico para NFC
        limit_req zone=api burst=50 nodelay;
        
        try_files $uri /index.php?$query_string;
        
        # Caching headers for NFC content
        add_header Cache-Control "public, max-age=300";
        add_header Vary "Accept-Encoding";
        
        # Optimizaciones para alta carga
        access_log off;
    }
    
    # API endpoints con rate limiting
    location ^~ /api/ {
        limit_req zone=api burst=30 nodelay;
        limit_conn perip 10;
        try_files $uri /index.php?$query_string;
    }
}