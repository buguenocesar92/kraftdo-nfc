server {
    listen 80;
    server_name nfc.kraftdo.com _;
    root /var/www/html/public;
    index index.php index.html;

    # Security optimizado
    server_tokens off;
    
    # Headers para proxy reverso
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;
    
    # Rate limiting estricto para producción
    limit_req zone=general burst=10 nodelay;
    limit_conn perip 20;
    
    # Laravel public directory - configuración específica para URLs limpias
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Metrics endpoint (protegido)
    location /metrics {
        allow 10.0.0.0/8;
        allow 172.16.0.0/12;
        allow 192.168.0.0/16;
        deny all;
        try_files $uri /index.php?$query_string;
    }

    # Laravel Octane proxy configuration
    location ~ ^/(index\.php|nfc|api|admin|auth|dashboard|livewire|filament) {
        # Proxy to Laravel Octane server (internal port 8080)
        proxy_pass http://127.0.0.1:8080;
        
        # Headers críticos para Laravel Octane
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;
        
        # WebSocket support (for Livewire/broadcasting)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade_keepalive;
        
        # Timeouts optimizados para Octane
        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        
        # Buffer optimization
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 16 16k;
        proxy_busy_buffers_size 32k;
        
        # Security
        proxy_hide_header X-Powered-By;
        
        # No cache for dynamic content
        add_header Cache-Control "no-cache, private";
    }
    
    # Fallback for any PHP requests that bypass the above
    location ~ \.php$ {
        # Block direct PHP access (security)
        return 404;
    }

    # Static files caching agresivo para producción
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        log_not_found off;
    }
    
    # CSS y JS con versionado
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        
        # Compresión adicional
        gzip_static on;
    }

    # Storage files (uploaded content)
    location ~* ^/storage/(.+\.(jpg|jpeg|png|gif|svg|mp3|mp4|wav|pdf))$ {
        expires 1M;
        add_header Cache-Control "public";
        access_log off;
    }

    # Security: deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(storage/app|storage/framework|storage/logs|bootstrap/cache) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # NFC endpoint optimization (high traffic)
    location /nfc {
        # Rate limiting específico para NFC
        limit_req zone=api burst=50 nodelay;
        
        try_files $uri /index.php?$query_string;
        
        # Caching headers for NFC content
        add_header Cache-Control "public, max-age=300";
        add_header Vary "Accept-Encoding";
        
        # Optimizaciones para alta carga
        access_log off;
    }
    
    # API endpoints con rate limiting
    location ^~ /api/ {
        limit_req zone=api burst=30 nodelay;
        limit_conn perip 10;
        try_files $uri /index.php?$query_string;
    }
}