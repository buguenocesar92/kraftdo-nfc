server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Health check
    location /health {
        access_log off;
        return 200 '{"status":"ok","server":"nginx+php-fpm"}';
        add_header Content-Type application/json;
    }

    # Livewire assets (must come before static files rule)
    location /livewire/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Filament assets
    location /filament/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static files (excluding livewire and filament paths)
    location ~* ^(?!/livewire/)(?!/filament/).*\.(css|js|gif|ico|jpe?g|png|svg|woff2?|ttf|eot|pdf|zip)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Laravel routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # PHP settings
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 128k;
        fastcgi_buffers 4 256k;
        fastcgi_busy_buffers_size 256k;
    }

    # Deny access to hidden files
    location ~ /\. {
        deny all;
    }
}