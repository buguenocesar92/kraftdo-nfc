# Nginx Dual Server Configuration
# Admin Panel (Filament): PHP-FPM
# Frontend NFC: Octane + Swoole

upstream php-fpm {
    server unix:/var/run/php/php8.3-fpm.sock;
}

upstream octane-backend {
    server 127.0.0.1:8080;
}

# Rate limiting zones (admin zone específica para panel)
limit_req_zone $binary_remote_addr zone=admin:10m rate=10r/m;

# Connection upgrade for WebSockets
map $http_upgrade $connection_upgrade_keepalive {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name nfc.kraftdo.com _;
    root /var/www/html/public;
    index index.php index.html;

    # Security headers
    server_tokens off;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";
    
    # Real IP configuration
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;
    
    # General rate limiting
    limit_req zone=general burst=10 nodelay;
    limit_conn perip 20;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ===========================================
    # ADMIN PANEL - PHP-FPM (Filament)
    # ===========================================
    location ~ ^/(admin|filament)(/.*)?$ {
        # Rate limiting para admin
        limit_req zone=admin burst=5 nodelay;
        
        # Try files first
        try_files $uri $uri/ @admin_php;
        
        # Security headers específicos para admin
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }
    
    # Admin PHP handler
    location @admin_php {
        fastcgi_pass php-fpm;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
        
        # Timeouts para admin
        fastcgi_connect_timeout 30s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;
        
        # Buffer settings
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
        fastcgi_busy_buffers_size 32k;
    }

    # Livewire específico para admin (PHP-FPM)
    location ~ ^/livewire/(.*)$ {
        # Solo si viene desde admin
        if ($http_referer ~* "/admin") {
            fastcgi_pass php-fpm;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root/index.php;
            include fastcgi_params;
            break;
        }
        
        # Si no viene de admin, enviar a Octane
        proxy_pass http://octane-backend;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===========================================
    # FRONTEND NFC - OCTANE + SWOOLE
    # ===========================================
    
    # API endpoints (alto rendimiento)
    location ^~ /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://octane-backend;
        
        # Headers para API
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade_keepalive;
        
        # Timeouts optimizados
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
        
        # Cache headers para API
        add_header Cache-Control "public, max-age=60";
    }
    
    # NFC endpoints (muy alto tráfico)
    location ^~ /nfc/ {
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://octane-backend;
        
        # Headers optimizados para NFC
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Sin logs para mejor rendimiento
        access_log off;
        
        # Cache agresivo para NFC content
        add_header Cache-Control "public, max-age=300";
    }
    
    # Token gifts y frontend público
    location ~ ^/(token|gift|qr|share)(/.*)?$ {
        proxy_pass http://octane-backend;
        
        # Headers estándar
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support para Livewire frontend
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade_keepalive;
        
        # Cache para frontend
        add_header Cache-Control "public, max-age=60";
    }
    
    # Homepage y rutas principales (Octane)
    location / {
        try_files $uri $uri/ @octane;
    }
    
    location @octane {
        proxy_pass http://octane-backend;
        
        # Headers estándar
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade_keepalive;
    }

    # ===========================================
    # STATIC FILES
    # ===========================================
    
    # Assets con versionado (cache agresivo)
    location ~* \.(css|js)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
        gzip_static on;
    }
    
    # Imágenes y multimedia
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|mp3|mp4|wav|pdf)$ {
        expires 1M;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        access_log off;
    }

    # ===========================================
    # SECURITY
    # ===========================================
    
    # Block direct PHP access
    location ~ \.php$ {
        return 404;
    }
    
    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
    }
    
    location ~ /(storage/app|storage/framework|storage/logs|bootstrap/cache) {
        deny all;
        access_log off;
    }
}