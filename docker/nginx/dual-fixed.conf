# Nginx Dual Server Configuration - Fixed Livewire
# Admin Panel (Filament): PHP-FPM
# Frontend NFC: Octane + Swoole

# Rate limiting zones (admin zone específica para panel)
limit_req_zone $binary_remote_addr zone=admin:10m rate=30r/m;

# Connection upgrade for WebSockets
map $http_upgrade $connection_upgrade_keepalive {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name _;
    root /var/www/html/public;
    index index.php;

    # Security headers
    server_tokens off;
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ===========================================
    # ADMIN PANEL - PHP-FPM (Filament)
    # ===========================================
    
    # Admin panel routes - always PHP-FPM
    location ~ ^/(admin|filament)(/.*)?$ {
        limit_req zone=admin burst=10 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
        
        # PHP processing for admin
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            
            fastcgi_connect_timeout 30s;
            fastcgi_send_timeout 60s;
            fastcgi_read_timeout 60s;
            fastcgi_buffer_size 16k;
            fastcgi_buffers 16 16k;
            fastcgi_busy_buffers_size 32k;
        }
    }

    # Livewire assets and AJAX - ALWAYS PHP-FPM for consistency
    location ~ ^/livewire/(.*)$ {
        try_files $uri /index.php?$query_string;
        
        location ~ \.php$ {
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;
            
            fastcgi_connect_timeout 30s;
            fastcgi_send_timeout 60s;
            fastcgi_read_timeout 60s;
        }
    }

    # ===========================================
    # FRONTEND NFC - OCTANE + SWOOLE
    # ===========================================
    
    # API endpoints (alto rendimiento con Octane)
    location ^~ /api/ {
        limit_req zone=api burst=50 nodelay;
        proxy_pass http://127.0.0.1:8080;
        
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade_keepalive;
        
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
    
    # NFC endpoints (muy alto tráfico con Octane)
    location ^~ /nfc/ {
        limit_req zone=api burst=100 nodelay;
        proxy_pass http://127.0.0.1:8080;
        
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        access_log off;
        add_header Cache-Control "public, max-age=300";
    }
    
    # ===========================================
    # STATIC FILES
    # ===========================================
    
    # Assets con versionado (cache agresivo)
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # ===========================================
    # DEFAULT ROUTES
    # ===========================================
    
    # Homepage y otras rutas principales - Octane para mejor rendimiento
    location / {
        # Excluir rutas que deben ir a PHP-FPM
        if ($uri ~ ^/(admin|filament|livewire)) {
            return 444; # This will be handled by specific locations above
        }
        
        limit_req zone=general burst=20 nodelay;
        
        # Try files first, then proxy to Octane
        try_files $uri $uri/ @octane;
    }
    
    # Octane fallback para rutas dinámicas del frontend
    location @octane {
        proxy_pass http://127.0.0.1:8080;
        
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade_keepalive;
    }

    # PHP fallback para rutas que necesiten PHP-FPM
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        fastcgi_connect_timeout 30s;
        fastcgi_send_timeout 60s;
        fastcgi_read_timeout 60s;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 16 16k;
        fastcgi_busy_buffers_size 32k;
    }

    # ===========================================
    # SECURITY
    # ===========================================
    
    # Deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
    }
    
    location ~ /(storage/framework|storage/logs|bootstrap/cache) {
        deny all;
        access_log off;
    }
}