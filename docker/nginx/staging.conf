server {
    listen 8080;
    server_name staging.kraftdo.com _;
    root /var/www/html/public;
    index index.php index.html;

    # Security optimizado para staging
    server_tokens off;
    
    # Headers para proxy reverso
    real_ip_header X-Forwarded-For;
    set_real_ip_from 0.0.0.0/0;
    
    # Rate limiting para staging (más permisivo)
    limit_req zone=general burst=20 nodelay;
    limit_conn perip 50;
    
    # Laravel public directory - configuración específica para URLs limpias
    location / {
        try_files $uri $uri/ /index.php?$query_string;
        
        # Headers adicionales para staging
        add_header X-Environment "staging" always;
        add_header X-Debug-Info "enabled" always;
    }
    
    # Endpoint de health check para staging
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # PHP-FPM con configuración específica para Laravel Staging
    location ~ \.php$ {
        # No permitir acceso directo a archivos PHP que no sean index.php
        location ~ ^/(?!index\.php$).+\.php$ {
            return 404;
        }
        
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Headers críticos para Laravel - pasados a través de FastCGI
        fastcgi_param HTTP_X_REAL_IP $remote_addr;
        fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;
        fastcgi_param HTTP_X_FORWARDED_HOST $host;
        fastcgi_param HTTP_HOST $host;
        fastcgi_param SERVER_NAME $host;
        fastcgi_param HTTP_X_ENVIRONMENT "staging";
        
        # Configurar HTTPS correctamente si es necesario
        fastcgi_param HTTPS $https if_not_empty;
        
        # Security
        fastcgi_hide_header X-Powered-By;
        
        # Timeouts más largos para debugging en staging
        fastcgi_read_timeout 600;
        fastcgi_send_timeout 600;
        fastcgi_connect_timeout 60;
        
        # Buffer sizes para staging
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 32k;
        fastcgi_busy_buffers_size 64k;
    }

    # Static files caching para staging (menos agresivo)
    location ~* \.(jpg|jpeg|png|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        add_header X-Environment "staging" always;
        access_log off;
    }
    
    # CSS y JS files con cache reducido para desarrollo
    location ~* \.(css|js)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
        add_header X-Environment "staging" always;
    }

    # Storage files (uploaded content)
    location ~* ^/storage/(.+\.(jpg|jpeg|png|gif|svg|mp3|mp4|wav|pdf))$ {
        expires 1M;
        add_header Cache-Control "public";
        access_log off;
    }

    # Security: deny access to sensitive files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ /(storage/app|storage/framework|storage/logs|bootstrap/cache) {
        deny all;
        access_log off;
        log_not_found off;
    }

    # NFC endpoint para staging con debugging
    location /nfc {
        try_files $uri /index.php?$query_string;
        
        # Caching headers menos agresivo para staging
        add_header Cache-Control "public, max-age=60";
        add_header X-Environment "staging" always;
        add_header X-NFC-Debug "enabled" always;
        
        # Logging para debugging
        access_log /var/log/nginx/nfc_staging.log main;
    }
    
    # Endpoint especial para testing en staging
    location /staging-debug {
        try_files $uri /index.php?$query_string;
        add_header X-Debug-Mode "enabled" always;
        add_header Content-Type "application/json" always;
    }
} 