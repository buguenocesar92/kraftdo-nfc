; Configuración PHP optimizada para producción - Laravel NFC App
; Limites de memoria y ejecución
memory_limit = 512M
post_max_size = 100M
upload_max_filesize = 50M
max_file_uploads = 50
max_execution_time = 120
max_input_time = 120
max_input_vars = 5000
max_input_nesting_level = 128

; Configuración de buffers
output_buffering = 4096
implicit_flush = Off

; Configuración de realpath cache
realpath_cache_size = 4M
realpath_cache_ttl = 120

; Timezone
date.timezone = "America/Lima"

; Error handling optimizado (producción)
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php_errors.log
log_errors_max_len = 1024
ignore_repeated_errors = On
ignore_repeated_source = Off
report_memleaks = On
track_errors = Off
xmlrpc_errors = Off
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Session optimizada y segura
session.cookie_httponly = On
session.cookie_secure = On
session.use_strict_mode = On
session.cookie_samesite = "Strict"
session.use_only_cookies = On
session.use_trans_sid = Off
session.cache_limiter = nocache
session.cache_expire = 180
session.gc_maxlifetime = 7200
session.gc_probability = 1
session.gc_divisor = 1000
session.hash_function = sha256
session.hash_bits_per_character = 5
session.sid_length = 48
session.sid_bits_per_character = 6

; Security mejorada
expose_php = Off
allow_url_fopen = On
allow_url_include = Off
auto_globals_jit = On
register_argc_argv = Off
default_socket_timeout = 30
auto_detect_line_endings = Off

; Configuración de archivos
file_uploads = On
upload_tmp_dir = /tmp
auto_prepend_file = 
auto_append_file = 
default_mimetype = "text/html"
default_charset = "UTF-8"

; Configuración de mail
sendmail_path = "/usr/sbin/sendmail -t -i"
mail.add_x_header = Off

; Configuración de recursos
max_resources = -1

; Configuración de datos POST/GET
post_max_size = 100M
max_input_vars = 5000
request_order = "GP"
variables_order = "GPCS"

; Configuración de user agent
user_agent = 
default_socket_timeout = 30

; Configuración adicional para Laravel
short_open_tag = Off
asp_tags = Off
precision = 14
serialize_precision = -1
zend.enable_gc = On
zlib.output_compression = Off