; PHP Configuration for Laravel Staging - OPTIMIZED FOR 3 CORES
; Memory settings - Enhanced for 1500-2000 concurrent users
memory_limit = 1024M
max_execution_time = 300
upload_max_filesize = 50M
post_max_size = 50M
max_input_vars = 10000
max_input_time = 300
max_input_nesting_level = 128

; File handling optimizations
file_uploads = On
upload_tmp_dir = /tmp
max_file_uploads = 50

; Error handling
display_errors = Off
display_startup_errors = Off
log_errors = On
log_errors_max_len = 1024
error_log = /var/log/php/error.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
ignore_repeated_errors = On
ignore_repeated_source = On

; Date
date.timezone = America/Santiago

; Session optimizations - Redis based for high concurrency
session.cookie_httponly = 1
session.cookie_secure = 1
session.cookie_samesite = "Lax"
session.use_strict_mode = 1
session.use_only_cookies = 1
session.use_trans_sid = 0
session.cache_limiter = nocache
session.cache_expire = 180
session.gc_maxlifetime = 7200
session.gc_probability = 0
session.gc_divisor = 1000
session.hash_function = 1
session.hash_bits_per_character = 6
session.save_handler = redis
session.save_path = "tcp://redis:6379"

; Security enhancements - Production ready
expose_php = Off
allow_url_fopen = Off
allow_url_include = Off
enable_dl = Off
disable_functions = exec,passthru,shell_exec,system,proc_open,popen,curl_exec,curl_multi_exec,parse_ini_file,show_source,phpinfo,eval,assert

; Performance optimizations - Critical for Laravel with SSD
realpath_cache_size = 32768K
realpath_cache_ttl = 10800
user_ini.cache_ttl = 10800

; Output buffering for better performance - optimized for 3 cores
output_buffering = 16384
implicit_flush = Off
serialize_precision = -1

; Connection handling
default_socket_timeout = 60
auto_detect_line_endings = Off

; Resource limits
max_input_time = 300
default_charset = "UTF-8"
internal_encoding = "UTF-8"
input_encoding = "UTF-8"
output_encoding = "UTF-8"

; Mail function (if using PHP mail)
sendmail_path = /usr/sbin/sendmail -t -i
mail.add_x_header = Off

; MySQL optimizations for Laravel - High performance
mysqli.default_port = 3306
mysqli.default_socket =
mysqli.default_host =
mysqli.default_user =
mysqli.default_pw =
mysqli.reconnect = Off
mysqli.cache_size = 8000
mysqli.allow_local_infile = Off

; PDO optimizations - Enhanced for high concurrency
pdo_mysql.cache_size = 8000
pdo_mysql.default_socket =

; Database connection optimizations
default_socket_timeout = 30
mysql.connect_timeout = 30

; Zlib compression for better bandwidth
zlib.output_compression = On
zlib.output_compression_level = 6
zlib.output_handler =

; Opcache integration check
; OPcache is loaded via opcache.ini - do not load here
; extension=opcache

; Additional performance tweaks
variables_order = "GPCS"
request_order = "GP"
register_argc_argv = Off
auto_globals_jit = On
enable_post_data_reading = On

; Logging and monitoring
log_errors_max_len = 1024
ignore_repeated_errors = On
track_errors = Off
html_errors = Off

; CLI optimizations (for Artisan commands)
cli_server.color = On

; Security headers support
always_populate_raw_post_data = -1