; OPcache configuration for Laravel Staging - OPTIMIZED FOR 3 CORES
zend_extension=opcache

; Enable opcache
opcache.enable=1
opcache.enable_cli=1

; Memory settings - Optimized for 1500-2000 concurrent users
opcache.memory_consumption=1024
opcache.interned_strings_buffer=64
opcache.max_accelerated_files=50000

; Performance settings - Enhanced for high concurrency
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.save_comments=0
opcache.fast_shutdown=1

; Advanced performance optimizations - Multi-core ready
opcache.enable_file_override=1
opcache.optimization_level=0x7FFFBFFF
opcache.inherited_hack=1
opcache.dups_fix=1
opcache.max_file_size=0
opcache.huge_code_pages=1
opcache.lockfile_path=/tmp

; File cache settings for SSD optimization  
opcache.file_cache_only=0
opcache.file_cache_consistency_checks=0
opcache.file_cache_fallback=1

; Preloading (Laravel 8+) - Uncomment if using preloading
; opcache.preload=/var/www/html/preload.php
; opcache.preload_user=www-data

; Debugging and monitoring (disable in production)
opcache.log_verbosity_level=2
opcache.preferred_memory_model=""

; Security
opcache.restrict_api=/var/www/html

; Additional memory optimizations
opcache.max_wasted_percentage=10
opcache.use_cwd=1
opcache.validate_permission=1
opcache.validate_root=1

; Error handling
opcache.blacklist_filename=""
opcache.max_file_size=0

; JIT compilation (PHP 8.3+) - Enabled for maximum performance
opcache.jit_buffer_size=256M
opcache.jit=1255
opcache.jit_hot_loop=64
opcache.jit_hot_func=128
opcache.jit_hot_return=8
opcache.jit_hot_side_exit=8