; OPcache optimizado para Laravel en producción
; Configuración básica
opcache.enable=1
opcache.enable_cli=1

; Configuración de memoria
opcache.memory_consumption=512
opcache.interned_strings_buffer=64
opcache.max_accelerated_files=50000

; Configuración de validación (producción)
opcache.validate_timestamps=0
opcache.revalidate_freq=0
opcache.fast_shutdown=1
opcache.enable_file_override=1

; Configuración de optimización
opcache.optimization_level=0x7FFFBFFF
opcache.use_cwd=1
opcache.max_file_size=0
opcache.consistency_checks=0
opcache.force_restart_timeout=180
opcache.error_log=/var/log/opcache_errors.log
opcache.log_verbosity_level=2

; Configuración de archivos
opcache.max_wasted_percentage=10
opcache.restrict_api=""
opcache.blacklist_filename=""

; Configuraciones avanzadas para mejor performance
opcache.save_comments=0
opcache.load_comments=0
opcache.enable_file_override=1
opcache.huge_code_pages=1

; JIT (Just In Time compilation) para PHP 8.x
opcache.jit_buffer_size=128M
opcache.jit=1255
opcache.preload_user=www
; opcache.preload=/var/www/html/preload.php