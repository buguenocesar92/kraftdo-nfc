; OPcache configuration for Laravel Staging - OPTIMIZED
zend_extension=opcache

; Enable opcache
opcache.enable=1
opcache.enable_cli=1

; Memory settings - Optimized for 3.6GB RAM server
opcache.memory_consumption=512
opcache.interned_strings_buffer=32
opcache.max_accelerated_files=30000

; Performance settings - Enhanced for production-like staging
opcache.validate_timestamps=1
opcache.revalidate_freq=60
opcache.save_comments=1
opcache.fast_shutdown=1

; Advanced performance optimizations
opcache.enable_file_override=1
opcache.optimization_level=0x7FFFBFFF
opcache.inherited_hack=1
opcache.dups_fix=1
opcache.max_file_size=0

; File cache settings for better performance
opcache.file_cache_only=0
opcache.file_cache_consistency_checks=1
opcache.file_cache_fallback=1

; Preloading (Laravel 8+) - Uncomment if using preloading
; opcache.preload=/var/www/html/preload.php
; opcache.preload_user=www-data

; Debugging and monitoring (disable in production)
opcache.log_verbosity_level=2
opcache.preferred_memory_model=""

; Security
opcache.restrict_api=/var/www/html

; Additional memory optimizations
opcache.max_wasted_percentage=10
opcache.use_cwd=1
opcache.validate_permission=1
opcache.validate_root=1

; Error handling
opcache.blacklist_filename=""
opcache.max_file_size=0

; JIT compilation (PHP 8.0+) - Uncomment if using PHP 8+
; opcache.jit_buffer_size=100M
; opcache.jit=1255