; Configuración PHP para desarrollo - Laravel NFC App
; Sobrescribe configuraciones específicas para desarrollo

; Límites más generosos para desarrollo
memory_limit = 1G
max_execution_time = 300
max_input_time = 300

; Error handling para desarrollo
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/log/php_errors.log

; Debugging
html_errors = On
docref_root = "http://www.php.net/manual/en/"
docref_ext = .php

; XDebug configuration (si está instalado)
; xdebug.mode = debug,develop
; xdebug.start_with_request = yes
; xdebug.client_host = host.docker.internal
; xdebug.client_port = 9003
; xdebug.log = /var/log/xdebug.log

; Session menos estricta para desarrollo
session.cookie_secure = Off
session.cookie_samesite = "Lax"

; OPcache para desarrollo (menos agresivo)
opcache.validate_timestamps = 1
opcache.revalidate_freq = 2
opcache.save_comments = 1
opcache.load_comments = 1