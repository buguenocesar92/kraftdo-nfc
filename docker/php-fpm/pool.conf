[www]
user = nginx
group = nginx
listen = 127.0.0.1:9000
listen.owner = nginx
listen.group = nginx
listen.mode = 0660
listen.backlog = 511

; Process management optimized for 3 cores and 1500-2000 users
pm = dynamic
pm.max_children = 75
pm.start_servers = 25
pm.min_spare_servers = 15
pm.max_spare_servers = 35
pm.max_requests = 1000
pm.process_idle_timeout = 30s
request_terminate_timeout = 300s
request_slowlog_timeout = 10s
slowlog = /var/log/php/slow.log

; Enhanced logging and monitoring
catch_workers_output = yes
decorate_workers_output = no
clear_env = no

; Security and access logging
access.log = /var/log/php/access.log
access.format = "%R - %u %t \"%m %r%Q%q\" %s %f %{mili}d %{kilo}M %C%%"

; Process management tuning
rlimit_files = 65536
rlimit_core = unlimited

; PHP configuration optimized for high performance
php_admin_value[error_log] = /var/log/php/error.log
php_admin_flag[log_errors] = on
php_admin_value[memory_limit] = 1024M
php_admin_value[max_execution_time] = 300
php_admin_value[upload_max_filesize] = 50M
php_admin_value[post_max_size] = 50M

; Session configuration for Redis
php_value[session.save_handler] = redis
php_value[session.save_path] = "tcp://redis:6379"
php_value[session.gc_probability] = 0
php_value[session.gc_maxlifetime] = 7200

; Performance optimizations
php_admin_value[opcache.enable] = 1
php_admin_value[opcache.memory_consumption] = 1024
php_admin_value[opcache.max_accelerated_files] = 50000
php_admin_value[realpath_cache_size] = 32768K
php_admin_value[realpath_cache_ttl] = 10800