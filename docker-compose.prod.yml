# ===========================================
# KRAFTDO NFC - PRODUCTION DOCKER COMPOSE
# ===========================================
# Basado en docker-compose.dev.yml funcional, optimizado para producción

services:
  # ==========================================
  # WEB SERVER - PHP-FPM + Nginx (Production)
  # ==========================================
  web:
    build:
      context: .
      dockerfile: Dockerfile.staging
    container_name: ${COMPOSE_PROJECT_NAME:-kraftdo-nfc}-prod-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8082}:80"
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
      # Código de solo lectura en producción
      - .:/var/www/html:ro
    networks:
      - laravel-prod
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_NAME=${APP_NAME:-KraftDo NFC}
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
      - APP_KEY=${APP_KEY:?APP_KEY must be set}
      - APP_URL=${APP_URL:?APP_URL must be set}
      - ASSET_URL=${ASSET_URL:-${APP_URL}}
      - LIVEWIRE_ASSET_URL=${LIVEWIRE_ASSET_URL:-${APP_URL}}
      # Database Externa
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=${DB_HOST:?DB_HOST must be set}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:?DB_DATABASE must be set}
      - DB_USERNAME=${DB_USERNAME:?DB_USERNAME must be set}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - DB_SSLMODE=${DB_SSLMODE:-REQUIRE}
      # Session config - Segura para producción
      - SESSION_DOMAIN=${SESSION_DOMAIN:?SESSION_DOMAIN must be set}
      - SESSION_SECURE_COOKIE=${SESSION_SECURE_COOKIE:-true}
      - SESSION_SAME_SITE=${SESSION_SAME_SITE:-strict}
      # Redis
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - SESSION_DRIVER=${SESSION_DRIVER:-redis}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
      - LOG_LEVEL=${LOG_LEVEL:-warning}
      # Production specific
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-false}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # REDIS (Cache y Sesiones)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-kraftdo-nfc}-prod-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --requirepass "${REDIS_PASSWORD}"
      --maxmemory ${REDIS_MAX_MEMORY:-1gb}
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --timeout 300
      --tcp-keepalive 60
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6002}:6379"
    networks:
      - laravel-prod
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # QUEUE WORKERS
  # ==========================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.staging
    container_name: ${COMPOSE_PROJECT_NAME:-kraftdo-nfc}-prod-worker
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_NAME=${APP_NAME:-KraftDo NFC}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY:?APP_KEY must be set}
      - APP_DEBUG=false
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=${DB_HOST:?DB_HOST must be set}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:?DB_DATABASE must be set}
      - DB_USERNAME=${DB_USERNAME:?DB_USERNAME must be set}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
      - QUEUE_WORKER=true
      - QUEUE_TIMEOUT=${QUEUE_TIMEOUT:-300}
      - QUEUE_TRIES=${QUEUE_TRIES:-3}
      - QUEUE_WORKERS=${QUEUE_WORKERS:-4}
      - LOG_LEVEL=${LOG_LEVEL:-warning}
    volumes:
      - app_storage:/var/www/html/storage
      - .:/var/www/html:ro
    networks:
      - laravel-prod
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    command: ["/entrypoint-staging.sh", "php", "artisan", "queue:work", "--verbose", "--tries=3", "--timeout=300"]
    healthcheck:
      test: ["CMD", "php", "/var/www/html/artisan", "queue:monitor", "--max-jobs=${QUEUE_MAX_JOBS:-5000}"]
      interval: 60s
      timeout: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - workers

  # ==========================================
  # SCHEDULER (CRON)
  # ==========================================
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile.staging
    container_name: ${COMPOSE_PROJECT_NAME:-kraftdo-nfc}-prod-scheduler
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_NAME=${APP_NAME:-KraftDo NFC}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY:?APP_KEY must be set}
      - APP_DEBUG=false
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=${DB_HOST:?DB_HOST must be set}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:?DB_DATABASE must be set}
      - DB_USERNAME=${DB_USERNAME:?DB_USERNAME must be set}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - SCHEDULER=true
      - LOG_LEVEL=${LOG_LEVEL:-warning}
    volumes:
      - app_storage:/var/www/html/storage
      - .:/var/www/html:ro
    networks:
      - laravel-prod
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    command: ["/entrypoint-staging.sh", "php", "artisan", "schedule:work"]
    healthcheck:
      test: ["CMD", "ps", "aux", "|", "grep", "-v", "grep", "|", "grep", "php", "artisan", "schedule:run"]
      interval: 60s
      timeout: 30s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ==========================================
  # MONITORING & METRICS (Optional)
  # ==========================================
  monitoring:
    build:
      context: .
      dockerfile: Dockerfile.staging
    container_name: ${COMPOSE_PROJECT_NAME:-kraftdo-nfc}-prod-monitoring
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_NAME=${APP_NAME:-KraftDo NFC}
      - APP_ENV=${APP_ENV:-production}
      - APP_KEY=${APP_KEY:?APP_KEY must be set}
      - APP_DEBUG=false
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=${DB_HOST:?DB_HOST must be set}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:?DB_DATABASE must be set}
      - DB_USERNAME=${DB_USERNAME:?DB_USERNAME must be set}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PASSWORD=${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - MONITORING=true
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      - app_storage:/var/www/html/storage:ro
      - .:/var/www/html:ro
    networks:
      - laravel-prod
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    command: ["/entrypoint-staging.sh", "php", "artisan", "app:health-check"]
    healthcheck:
      test: ["CMD", "php", "/var/www/html/artisan", "app:health-check"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
    profiles:
      - monitoring

volumes:
  redis_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${REDIS_DATA_PATH:-./docker/data/redis}
  app_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${STORAGE_PATH:-./storage}
  app_bootstrap_cache:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${BOOTSTRAP_CACHE_PATH:-./bootstrap/cache}

networks:
  laravel-prod:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: ${NETWORK_SUBNET:-172.30.0.0/24}
          gateway: ${NETWORK_GATEWAY:-172.30.0.1}
    driver_opts:
      com.docker.network.bridge.name: kraftdo-prod-br0