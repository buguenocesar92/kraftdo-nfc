# Docker Compose para Laravel NFC con PHP-FPM + Nginx
services:
  # ==========================================
  # APLICACIÓN PRINCIPAL - PHP-FPM + Nginx
  # ==========================================
  app:
    build:
      context: .
      dockerfile: Dockerfile.staging
    container_name: nfc-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      # App Config
      - APP_NAME=KraftDo NFC
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:IPi0+QH97dbiFpJ8k6ek8LKk2c8aXYvRu5kSrEtyp2o=
      - APP_URL=http://localhost:8080
      - ASSET_URL=http://localhost:8080
      - LIVEWIRE_ASSET_URL=http://localhost:8080
      # Database Externa
      - DB_CONNECTION=mysql
      - DB_HOST=192.168.100.20
      - DB_PORT=3306
      - DB_DATABASE=kraftdo
      - DB_USERNAME=docker
      - DB_PASSWORD=Hero2025.
      - DB_SSLMODE=DISABLED
      # Session config
      - SESSION_DOMAIN=localhost
      - SESSION_SECURE_COOKIE=false
      - SESSION_SAME_SITE=lax
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - LOG_LEVEL=debug
      # Development specific
      - RUN_MIGRATIONS=true
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
      - ./app:/var/www/html/app
      - ./resources:/var/www/html/resources
      - ./routes:/var/www/html/routes
      - ./config:/var/www/html/config
      - ./database:/var/www/html/database
      - ./public:/var/www/html/public
    networks:
      - nfc-network
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # REDIS CACHE & SESSIONS
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: nfc-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-}"
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - nfc-network
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # QUEUE WORKER
  # ==========================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.staging
    container_name: nfc-worker
    restart: unless-stopped
    environment:
      # App Config (same as app)
      - APP_NAME=KraftDo NFC
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=base64:IPi0+QH97dbiFpJ8k6ek8LKk2c8aXYvRu5kSrEtyp2o=
      # Database Externa
      - DB_CONNECTION=mysql
      - DB_HOST=192.168.100.20
      - DB_PORT=3306
      - DB_DATABASE=kraftdo
      - DB_USERNAME=docker
      - DB_PASSWORD=Hero2025.
      # Redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - CACHE_DRIVER=redis
      - QUEUE_CONNECTION=redis
      # Worker Config
      - QUEUE_WORKER=true
      - QUEUE_TIMEOUT=${QUEUE_TIMEOUT:-90}
      - QUEUE_TRIES=${QUEUE_TRIES:-3}
    volumes:
      - app_storage:/var/www/html/storage
      - .:/var/www/html
    networks:
      - nfc-network
    depends_on:
      redis:
        condition: service_healthy
      app:
        condition: service_healthy
    command: ["/entrypoint-staging.sh", "php", "artisan", "queue:work", "--verbose"]
    profiles:
      - workers

volumes:
  redis_data:
    driver: local
  app_storage:
    driver: local
  app_bootstrap_cache:
    driver: local

networks:
  nfc-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.30.0.0/24
          gateway: 172.30.0.1