# ===========================================
# KRAFTDO NFC - DEVELOPMENT DOCKER COMPOSE  
# ===========================================
# Basado en docker-compose.hybrid.yml funcional, optimizado para desarrollo

services:
  # ==========================================
  # BACKEND - PHP-FPM (Laravel + Livewire)
  # ==========================================
  php-fpm:
    build:
      context: .
      dockerfile: Dockerfile.phpfpm
    container_name: ${COMPOSE_PROJECT_NAME:-kraftdo-nfc}-dev-php-fpm
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - ./storage:/var/www/html/storage
      - ./bootstrap/cache:/var/www/html/bootstrap/cache
    networks:
      - laravel-dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_NAME=${APP_NAME:-KraftDo NFC Dev}
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_KEY=${APP_KEY:-base64:IPi0+QH97dbiFpJ8k6ek8LKk2c8aXYvRu5kSrEtyp2o=}
      - APP_URL=${APP_URL:-http://localhost:8080}
      - ASSET_URL=${ASSET_URL:-http://localhost:8080}
      - LIVEWIRE_ASSET_URL=${LIVEWIRE_ASSET_URL:-http://localhost:8080}
      # Database Externa (igual que híbrido)
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=${DB_HOST:-192.168.100.20}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-kraftdo}
      - DB_USERNAME=${DB_USERNAME:-docker}
      - DB_PASSWORD=${DB_PASSWORD:-Hero2025.}
      - DB_SSLMODE=${DB_SSLMODE:-DISABLED}
      # Session config
      - SESSION_DOMAIN=${SESSION_DOMAIN:-localhost}
      - SESSION_SECURE_COOKIE=${SESSION_SECURE_COOKIE:-false}
      - SESSION_SAME_SITE=${SESSION_SAME_SITE:-lax}
      # Redis
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - SESSION_DRIVER=${SESSION_DRIVER:-redis}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # FRONTEND - FrankenPHP (Proxy + Assets)
  # ==========================================
  frankenphp:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    container_name: ${COMPOSE_PROJECT_NAME:-kraftdo-nfc}-dev-frankenphp-proxy
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
    volumes:
      - .:/app:ro  # Solo lectura para assets
      - ./storage/app/public:/app/storage/app/public:ro  # Storage files read-only
      - ./docker/frankenphp/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - laravel-dev
    depends_on:
      - php-fpm
    environment:
      - SERVER_NAME=${SERVER_NAME:-:80}
      - CADDY_GLOBAL_OPTIONS=${CADDY_GLOBAL_OPTIONS:-}
    command: ["frankenphp", "run", "--config", "/etc/caddy/Caddyfile"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # REDIS (Cache y Sesiones)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-kraftdo-nfc}-dev-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - laravel-dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # MAILHOG (EMAIL TESTING)
  # ==========================================
  mailhog:
    image: mailhog/mailhog:latest
    container_name: ${COMPOSE_PROJECT_NAME:-kraftdo-nfc}-dev-mailhog
    restart: unless-stopped
    ports:
      - "${MAILHOG_PORT:-8025}:8025"  # Web UI
      - "${MAILHOG_SMTP_PORT:-1025}:1025"  # SMTP
    networks:
      - laravel-dev

volumes: {}

networks:
  laravel-dev:
    driver: bridge