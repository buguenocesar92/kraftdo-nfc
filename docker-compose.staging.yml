# ===========================================
# KRAFTDO NFC - STAGING DOCKER COMPOSE  
# ===========================================
# Puerto 8084 - Entorno de staging para desarrollo

services:
  # ==========================================
  # WEB SERVER - PHP-FPM (Laravel + Livewire)
  # ==========================================
  web:
    build:
      context: .
      dockerfile: Dockerfile.staging
    container_name: ${COMPOSE_PROJECT_NAME:-kraftdo-nfc-staging}-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8084}:80"
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
      # Solo montar directorios específicos, no el .env
      - ./app:/var/www/html/app
      - ./resources:/var/www/html/resources
      - ./routes:/var/www/html/routes
      - ./config:/var/www/html/config
      - ./database:/var/www/html/database
      - ./public:/var/www/html/public
    networks:
      - laravel-staging
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_NAME=${APP_NAME:-KraftDo NFC Staging}
      - APP_ENV=${APP_ENV:-staging}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_KEY=${APP_KEY:?APP_KEY must be set}
      - APP_URL=${APP_URL:-http://kraftdo.cl:8084}
      - ASSET_URL=${ASSET_URL:-${APP_URL}}
      - LIVEWIRE_ASSET_URL=${LIVEWIRE_ASSET_URL:-${APP_URL}}
      # Database Externa
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=${DB_HOST:?DB_HOST must be set}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:?DB_DATABASE must be set}
      - DB_USERNAME=${DB_USERNAME:?DB_USERNAME must be set}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - DB_SSLMODE=${DB_SSLMODE:-PREFER}
      # Session config
      - SESSION_DOMAIN=${SESSION_DOMAIN:-kraftdo.cl}
      - SESSION_SECURE_COOKIE=${SESSION_SECURE_COOKIE:-false}
      - SESSION_SAME_SITE=${SESSION_SAME_SITE:-lax}
      # Redis
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - SESSION_DRIVER=${SESSION_DRIVER:-redis}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
      # Staging specific
      - RUN_MIGRATIONS=${RUN_MIGRATIONS:-false}
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # REDIS (Cache y Sesiones)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-kraftdo-nfc-staging}-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory ${REDIS_MAX_MEMORY:-512mb}
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    networks:
      - laravel-staging
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # QUEUE WORKERS (Opcional para staging)
  # ==========================================
  worker:
    build:
      context: .
      dockerfile: Dockerfile.staging
    container_name: ${COMPOSE_PROJECT_NAME:-kraftdo-nfc-staging}-worker
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_NAME=${APP_NAME:-KraftDo NFC Staging}
      - APP_ENV=${APP_ENV:-staging}
      - APP_KEY=${APP_KEY:?APP_KEY must be set}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=${DB_HOST:?DB_HOST must be set}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:?DB_DATABASE must be set}
      - DB_USERNAME=${DB_USERNAME:?DB_USERNAME must be set}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - REDIS_HOST=${REDIS_HOST:-redis}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
      - QUEUE_WORKER=true
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
    networks:
      - laravel-staging
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy
    command: ["/entrypoint-staging.sh", "php", "artisan", "queue:work", "--verbose"]
    profiles:
      - workers

volumes:
  redis_data:
    driver: local
  app_storage:
    driver: local
  app_bootstrap_cache:
    driver: local

networks:
  laravel-staging:
    driver: bridge