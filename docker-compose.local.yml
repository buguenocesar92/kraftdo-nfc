# Docker Compose para desarrollo local - Laravel + Redis + Octane
# Uso: docker-compose -f docker-compose.local.yml --env-file .env.local up

services:
  # Redis para desarrollo local
  redis:
    image: redis:7-alpine
    container_name: nfc-redis-local
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-test_password}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - nfc-local-network

  # Aplicación Laravel con Octane
  app:
    build: 
      context: .
      dockerfile: Dockerfile
    container_name: nfc-laravel-app-local
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8081}:8080"
    environment:
      # App config
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_KEY=${APP_KEY:?error}
      - APP_URL=${APP_URL:-http://localhost:8081}
      
      # Database config (SQLite para simplicidad local)
      - DB_CONNECTION=${DB_CONNECTION:-sqlite}
      - DB_DATABASE=${DB_DATABASE:-/var/www/html/database/database.sqlite}
      
      # Redis config (interno)
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-test_password}
      - REDIS_PORT=6379
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_CACHE_DB=${REDIS_CACHE_DB:-1}
      - REDIS_SESSION_DB=${REDIS_SESSION_DB:-2}
      - REDIS_QUEUE_DB=${REDIS_QUEUE_DB:-3}
      
      # Cache y sessions con Redis
      - CACHE_DRIVER=${CACHE_DRIVER:-redis}
      - SESSION_DRIVER=${SESSION_DRIVER:-redis}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-redis}
      
      # Octane config
      - OCTANE_SERVER=swoole
      - OCTANE_WORKERS=${OCTANE_WORKERS:-2}
      - OCTANE_MAX_REQUESTS=${OCTANE_MAX_REQUESTS:-500}
      
      # Mail config (log for local)
      - MAIL_MAILER=log
      - LOG_CHANNEL=stack
      - LOG_LEVEL=debug
    volumes:
      # Persistir storage y database
      - local_storage:/var/www/html/storage/app
      - local_logs:/var/www/html/storage/logs
      - local_database:/var/www/html/database
    
    networks:
      - nfc-local-network
    
    depends_on:
      - redis
    
    # Health check simple
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  redis_data:
  local_storage:
  local_logs:
  local_database:

networks:
  nfc-local-network:
    driver: bridge
    driver_opts:
      com.docker.network.enable_ipv6: "false"
    ipam:
      driver: default
      config:
        - subnet: 172.24.0.0/24
          gateway: 172.24.0.1
    labels:
      - "environment=local"
      - "project=nfc-laravel" 