# docker-compose.local.yml
services:
  web:
    image: ghcr.io/buguenocesar92/kraftdo-nfc:develop
    container_name: kraftdo-nfc-local-web
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8081}:80"
    volumes:
      - app_storage:/var/www/html/storage
      - app_bootstrap_cache:/var/www/html/bootstrap/cache
      - .:/var/www/html          # <- código local en tiempo real
    networks:
      - laravel-nfc-local
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - APP_NAME=KraftDo NFC Local
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_KEY=${APP_KEY:?APP_KEY must be set}
      - APP_URL=${APP_URL:-http://localhost:8081}
      - ASSET_URL=${ASSET_URL:-http://localhost:8081}
      - LIVEWIRE_ASSET_URL=${LIVEWIRE_ASSET_URL:-http://localhost:8081}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=${DB_HOST:?DB_HOST must be set}
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:?DB_DATABASE must be set}
      - DB_USERNAME=${DB_USERNAME:?DB_USERNAME must be set}
      - DB_PASSWORD=${DB_PASSWORD:?DB_PASSWORD must be set}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=
      - CACHE_DRIVER=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DOMAIN=${SESSION_DOMAIN:-localhost}
      - SESSION_SECURE_COOKIE=false
      - SESSION_SAME_SITE=lax
      - TRUSTED_PROXIES=*
      - LOG_LEVEL=debug
      - RUN_MIGRATIONS=true
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: kraftdo-nfc-local-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - laravel-nfc-local
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

volumes:
  app_storage:
    driver: local
  app_bootstrap_cache:
    driver: local

networks:
  laravel-nfc-local:
    driver: bridge