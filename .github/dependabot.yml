# GitHub Dependabot configuration for KraftDo NFC
# Updates dependencies automatically to maintain security and get latest features

version: 2
updates:
  # Composer (PHP dependencies)
  - package-ecosystem: "composer"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "America/Santiago"
    open-pull-requests-limit: 10
    reviewers:
      - "kraftdo-team"
    assignees:
      - "kraftdo-team"
    commit-message:
      prefix: "composer"
      prefix-development: "composer(dev)"
      include: "scope"
    labels:
      - "dependencies"
      - "php"
      - "composer"
    # Security updates get higher priority
    allow:
      - dependency-type: "direct"
      - dependency-type: "indirect"
    # Group Laravel ecosystem updates
    groups:
      laravel:
        patterns:
          - "laravel/*"
          - "illuminate/*"
        update-types:
          - "minor"
          - "patch"
      filament:
        patterns:
          - "filament/*"
        update-types:
          - "minor"
          - "patch"
      testing:
        patterns:
          - "pestphp/*"
          - "phpunit/*"
          - "mockery/*"
        update-types:
          - "minor"
          - "patch"

  # NPM (Node.js dependencies)  
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday" 
      time: "09:00"
      timezone: "America/Santiago"
    open-pull-requests-limit: 10
    reviewers:
      - "kraftdo-team"
    assignees:
      - "kraftdo-team"
    commit-message:
      prefix: "npm"
      prefix-development: "npm(dev)"
      include: "scope"
    labels:
      - "dependencies"
      - "javascript"
      - "npm"
    # Group frontend dependencies
    groups:
      build-tools:
        patterns:
          - "vite"
          - "laravel-vite-plugin"
          - "@vitejs/*"
        update-types:
          - "minor"
          - "patch"
      css-frameworks:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"
          - "autoprefixer"
          - "postcss"
        update-types:
          - "minor"
          - "patch"
      alpine-livewire:
        patterns:
          - "alpinejs"
          - "@alpinejs/*"
          - "livewire"
        update-types:
          - "minor"
          - "patch"

  # Docker base images
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "America/Santiago"
    open-pull-requests-limit: 5
    reviewers:
      - "kraftdo-team"
    assignees:
      - "kraftdo-team"
    commit-message:
      prefix: "docker"
      include: "scope"
    labels:
      - "dependencies"
      - "docker"
      - "infrastructure"

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/.github/workflows"
    schedule:
      interval: "weekly"
      day: "tuesday"
      time: "09:00"
      timezone: "America/Santiago"
    open-pull-requests-limit: 5
    reviewers:
      - "kraftdo-team"
    assignees:
      - "kraftdo-team"
    commit-message:
      prefix: "ci"
      include: "scope"
    labels:
      - "dependencies"
      - "github-actions"
      - "ci-cd"