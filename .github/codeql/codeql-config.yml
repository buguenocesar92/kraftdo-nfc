# CodeQL Analysis Configuration for KraftDo NFC
name: "KraftDo NFC Security Analysis"

disable-default-queries: false

queries:
  - name: security-and-quality
    uses: security-and-quality
  - name: security-extended  
    uses: security-extended

# Custom query filters and paths
paths:
  - "app/"
  - "config/"
  - "database/"
  - "routes/"
  - "resources/"

paths-ignore:
  - "vendor/"
  - "node_modules/"
  - "storage/logs/"
  - "bootstrap/cache/"
  - "public/build/"
  - "tests/"
  - "docs/"

# PHP-specific configuration
php:
  # Include framework-specific security patterns
  framework: "laravel"
  
  # Custom security patterns to detect
  security-patterns:
    - pattern: "eval\\("
      message: "Use of eval() detected - potential code injection"
      severity: "error"
      
    - pattern: "\\$_GET|\\$_POST|\\$_REQUEST"
      message: "Direct superglobal access - use Request object instead"  
      severity: "warning"
      
    - pattern: "DB::raw\\("
      message: "Raw database query - ensure proper escaping"
      severity: "note"

# JavaScript-specific configuration  
javascript:
  # Include common web security issues
  security-patterns:
    - pattern: "innerHTML.*=.*\\+"
      message: "Potential XSS vulnerability with innerHTML"
      severity: "warning"
      
    - pattern: "eval\\("
      message: "Use of eval() detected - potential code injection"
      severity: "error"