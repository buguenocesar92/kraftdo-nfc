name: Deploy KraftDo NFC to VPS

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  tests:
    runs-on: ubuntu-latest
    name: Run Tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, mysql, gd, zip, redis, bcmath, exif
        coverage: none
        
    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"
      
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      
    - name: Regenerate autoloader
      run: composer dump-autoload
      
    - name: Generate key
      run: php artisan key:generate
      
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install Node dependencies
      run: npm ci
      
    - name: Build Vite assets
      run: npm run build
        
    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite
        
    - name: Execute tests (Unit and Feature tests) via Pest
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: vendor/bin/pest --no-coverage

  build:
    needs: tests
    runs-on: ubuntu-latest
    name: Build NFC Image
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata for NFC image
      id: meta-nfc
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kraftdo-nfc
        tags: |
          type=ref,event=branch
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,prefix={{branch}}-
    
    - name: Build and push NFC image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta-nfc.outputs.tags }}
        labels: ${{ steps.meta-nfc.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: [tests, build]
    runs-on: ubuntu-latest
    name: Deploy to Environment
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/main'
    environment: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}
    
    steps:
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          # Determine environment and directory based on branch
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            ENV="production"
            PROJECT_DIR="/root/docker-projects/kraftdo-nfc-production"
            BRANCH="main"
            DOCKER_TAG="latest"
            COMPOSE_FILE="docker-compose.prod.yml"
            URL_BASE="https://api.kraftdo.cl"
            CONTAINER_PREFIX="kraftdo-nfc-production-prod"
          else
            ENV="staging"
            PROJECT_DIR="/root/docker-projects/kraftdo-nfc-staging"
            BRANCH="develop"
            DOCKER_TAG="develop"
            COMPOSE_FILE="docker-compose.staging.yml"
            URL_BASE="https://staging.kraftdo.cl"
            CONTAINER_PREFIX="kraftdo-nfc-staging"
          fi
          
          echo "🚀 Deploying to $ENV environment..."
          
          # Create project directory if it doesn't exist
          mkdir -p $PROJECT_DIR
          cd $PROJECT_DIR
          
          # Initialize git repository if it doesn't exist and pull latest code
          echo "🔄 Updating source code from repository..."
          if [ ! -d ".git" ]; then
            echo "📥 Cloning repository for the first time..."
            git clone https://github.com/${{ github.repository }}.git .
            git checkout $BRANCH
          else
            echo "📥 Pulling latest changes..."
            git fetch origin
            git reset --hard origin/$BRANCH
          fi
          
          # Download latest docker-compose configuration from repository (backup method)
          echo "📄 Ensuring latest docker-compose configuration..."
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L "https://api.github.com/repos/${{ github.repository }}/contents/$COMPOSE_FILE?ref=$BRANCH" \
               -o $COMPOSE_FILE
          
          # Login to GitHub Container Registry for private image access
          echo "🔑 Logging into GitHub Container Registry..."
          if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u buguenocesar92 --password-stdin
          else
            echo "⚠️  GHCR_TOKEN not found, trying with GITHUB_TOKEN..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          fi
          
          # Set environment variables based on environment
          echo "🔧 Setting environment variables for $ENV..."
          if [ "$ENV" = "production" ]; then
            export DB_HOST="${{ secrets.PROD_DB_HOST || secrets.DB_HOST }}"
            export DB_DATABASE="${{ secrets.PROD_DB_DATABASE || secrets.DB_DATABASE }}"
            export DB_USERNAME="${{ secrets.PROD_DB_USERNAME || secrets.DB_USERNAME }}"
            export DB_PASSWORD="${{ secrets.PROD_DB_PASSWORD || secrets.DB_PASSWORD }}"
            export APP_KEY="${{ secrets.PROD_APP_KEY || secrets.APP_KEY }}"
            export REDIS_PASSWORD="${{ secrets.PROD_REDIS_PASSWORD || 'kraftdo2024' }}"
            export APP_URL="$URL_BASE"
            export ASSET_URL="$URL_BASE"
            export LIVEWIRE_ASSET_URL="$URL_BASE"
            export SESSION_DOMAIN="api.kraftdo.cl"
            export SESSION_SECURE_COOKIE="true"
          else
            export DB_HOST="${{ secrets.DB_HOST }}"
            export DB_DATABASE="${{ secrets.DB_DATABASE }}"
            export DB_USERNAME="${{ secrets.DB_USERNAME }}"
            export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
            export APP_KEY="${{ secrets.APP_KEY }}"
            export REDIS_PASSWORD="${{ secrets.REDIS_PASSWORD || 'kraftdo2024' }}"
            export APP_URL="$URL_BASE"
            export ASSET_URL="$URL_BASE"
            export LIVEWIRE_ASSET_URL="$URL_BASE"
            export SESSION_DOMAIN="staging.kraftdo.cl"
            export SESSION_SECURE_COOKIE="true"
          fi
          
          # Pull latest image (using the pre-built base image)
          echo "⬇️ Pulling latest $ENV image..."
          docker pull ghcr.io/buguenocesar92/kraftdo-nfc:$DOCKER_TAG
          
          # Stop current container
          echo "🛑 Stopping current containers..."
          docker-compose -f $COMPOSE_FILE down || true
          
          # Clean problematic directories that might conflict with Docker mounts
          echo "🧹 Cleaning potential mount conflicts..."
          rm -rf public/storage || true
          
          # Remove volumes with old configuration (production only - to avoid bind mount conflicts)
          if [ "$ENV" = "production" ]; then
            echo "🗑️ Removing old volumes with bind mount configuration..."
            docker volume rm kraftdo-nfc-production_redis_data || true
            docker volume rm kraftdo-nfc-production_app_storage || true
            docker volume rm kraftdo-nfc-production_app_bootstrap_cache || true
            echo "✅ Old volumes removed, will create new Docker-managed volumes"
          fi
          
          # Verify docker-compose was downloaded
          if [ ! -f "$COMPOSE_FILE" ]; then
            echo "❌ Failed to download $COMPOSE_FILE"
            exit 1
          fi
          echo "✅ Docker-compose configuration updated from repository"
          
          # Start services
          echo "🚀 Starting $ENV services..."
          docker-compose -f $COMPOSE_FILE up -d
          
          # Wait for container to be ready
          echo "⏳ Waiting for container to be ready..."
          sleep 20
          
          # Verify application is working
          echo "🔧 Verifying application..."
          
          # Check container status first
          echo "📊 Container status:"
          docker ps -f name=$CONTAINER_PREFIX-web
          
          # Show recent logs before attempting connection
          echo "📋 Recent web container logs:"
          docker logs $CONTAINER_PREFIX-web --tail 50 || echo "No logs available yet"
          
          # Wait a bit more for Laravel to fully start
          echo "⏳ Waiting additional 30 seconds for Laravel to fully initialize..."
          sleep 30
          
          if ! docker-compose -f $COMPOSE_FILE exec -T web php artisan --version; then
            echo "❌ Laravel application not working"
            echo "📋 Full web container logs:"
            docker logs $CONTAINER_PREFIX-web --tail 100
            echo "📊 Container inspect:"
            docker inspect $CONTAINER_PREFIX-web --format='{{.State.Health.Status}}: {{.State.Health.Log}}'
            exit 1
          fi
          
          # Run migrations
          echo "🗄️ Running database migrations..."
          if ! docker-compose -f $COMPOSE_FILE exec -T web php artisan migrate --force; then
            echo "❌ Failed to run migrations"
            exit 1
          fi
          
          # Run seeders (optional - uncomment if needed)
          # echo "🌱 Running database seeders..."
          # docker-compose -f $COMPOSE_FILE exec -T web php artisan db:seed --force
          
          # Clear and optimize caches
          echo "🧹 Clearing and optimizing application caches..."
          docker-compose -f $COMPOSE_FILE exec -T web php artisan config:clear
          docker-compose -f $COMPOSE_FILE exec -T web php artisan route:clear
          docker-compose -f $COMPOSE_FILE exec -T web php artisan view:clear
          docker-compose -f $COMPOSE_FILE exec -T web php artisan config:cache
          docker-compose -f $COMPOSE_FILE exec -T web php artisan route:cache
          docker-compose -f $COMPOSE_FILE exec -T web php artisan view:cache
          
          # Create storage link if needed
          echo "🔗 Creating storage link..."
          docker-compose -f $COMPOSE_FILE exec -T web bash -c "
            # Remove any existing public/storage directory/link
            rm -rf public/storage || true
            # Create the symbolic link manually if Laravel command fails
            php artisan storage:link || ln -sfn /var/www/html/storage/app/public /var/www/html/public/storage
            # Verify the link was created (check if symlink exists)
            [ -L public/storage ] && echo "✅ Storage link created successfully" || echo "⚠️ Storage link may not exist"
          "
          
          # Create admin user if needed
          echo "👤 Running seeders..."
          docker-compose -f $COMPOSE_FILE exec -T web php artisan db:seed --class=AdminUserSeeder || true
          
          # Verify deployment
          if [ "$(docker ps -q -f name=$CONTAINER_PREFIX-web)" ]; then
            echo "✅ Deployment successful!"
            echo "📋 Recent application logs:"
            docker logs $CONTAINER_PREFIX-web --tail 50
          else
            echo "❌ Deployment failed!"
            docker logs $CONTAINER_PREFIX-web
            exit 1
          fi
          
          # Cleanup old images
          echo "🧹 Cleaning up old images..."
          docker image prune -f || true
          
          echo "🎉 KraftDo NFC $ENV deployment completed successfully!"
          echo "📱 App available at: $URL_BASE"
    
    - name: Slack notification
      if: always()
      run: |
        STATUS="${{ job.status }}"
        if [ "$STATUS" = "success" ]; then
          EMOJI="✅"
          COLOR="good"
        else
          EMOJI="❌"
          COLOR="danger"
        fi
        
        URL="${{ github.ref == 'refs/heads/main' && 'https://api.kraftdo.cl' || 'https://staging.kraftdo.cl' }}"
        
        curl -X POST -H 'Content-type: application/json' \
        --data "{
          \"text\": \"<!channel> $EMOJI KraftDo NFC Deploy $STATUS\",
          \"attachments\": [{
            \"color\": \"$COLOR\",
            \"fields\": [
              {\"title\": \"Branch\", \"value\": \"${{ github.ref_name }}\", \"short\": true},
              {\"title\": \"Commit\", \"value\": \"${{ github.sha }}\", \"short\": true},
              {\"title\": \"URL\", \"value\": \"$URL\", \"short\": false}
            ]
          }]
        }" \
        ${{ secrets.SLACK_WEBHOOK_URL }}
    
    - name: Discord notification
      if: always()
      run: |
        STATUS="${{ job.status }}"
        if [ "$STATUS" = "success" ]; then
          EMOJI="✅"
          COLOR="3066993"
        else
          EMOJI="❌"
          COLOR="15158332"
        fi
        
        URL="${{ github.ref == 'refs/heads/main' && 'https://api.kraftdo.cl' || 'https://staging.kraftdo.cl' }}"
        
        curl -H "Content-Type: application/json" \
             -X POST \
             -d "{
               \"content\": \"@everyone\",
               \"embeds\": [{
                 \"title\": \"$EMOJI KraftDo NFC Deploy\",
                 \"description\": \"**Status:** $STATUS\n**Branch:** ${{ github.ref_name }}\n**Commit:** \`${{ github.sha }}\`\n**URL:** $URL\",
                 \"color\": $COLOR,
                 \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%S.000Z)\"
               }]
             }" \
             ${{ secrets.DISCORD_WEBHOOK_URL }}
    
    - name: Email notification
      if: always()
      uses: dawidd6/action-send-mail@v3
      with:
        server_address: smtp.gmail.com
        server_port: 587
        username: ${{ secrets.MAIL_USERNAME }}
        password: ${{ secrets.MAIL_PASSWORD }}
        subject: "${{ job.status == 'success' && '✅' || '❌' }} KraftDo NFC Deploy ${{ job.status }}"
        body: |
          Deploy del proyecto KraftDo NFC ha ${{ job.status == 'success' && 'completado exitosamente' || 'fallado' }}.
          
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          URL: ${{ github.ref == 'refs/heads/main' && 'https://api.kraftdo.cl' || 'https://staging.kraftdo.cl' }}
          
          Timestamp: ${{ github.event.head_commit.timestamp }}
        to: ${{ secrets.NOTIFICATION_EMAIL }}
        from: KraftDo Deploy <noreply@kraftdo.cl>