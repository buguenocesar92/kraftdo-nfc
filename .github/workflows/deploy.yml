name: Deploy KraftDo NFC to VPS

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  tests:
    runs-on: ubuntu-latest
    name: Run Tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, mysql, gd, zip, redis, bcmath, exif
        coverage: none
        
    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"
      
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      
    - name: Generate key
      run: php artisan key:generate
      
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install Node dependencies
      run: npm ci
      
    - name: Build Vite assets
      run: npm run build
        
    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite
        
    - name: Execute tests (Unit and Feature tests) via Pest
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: vendor/bin/pest --no-coverage

  build:
    needs: tests
    runs-on: ubuntu-latest
    name: Build and Push to GHCR
    if: github.ref == 'refs/heads/develop'
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=staging,enable={{is_default_branch}}
    
    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile.staging
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy to Staging
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          cd /root/kraftdo-nfc
          
          # Login to GitHub Container Registry
          echo "🔐 Logging into GitHub Container Registry..."
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Set environment variables for staging
          echo "🔧 Setting environment variables..."
          export DB_HOST=${{ secrets.DB_HOST }}
          export DB_DATABASE=${{ secrets.DB_DATABASE }}
          export DB_USERNAME=${{ secrets.DB_USERNAME }}
          export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          export APP_KEY=${{ secrets.APP_KEY }}
          
          # Pull latest image
          echo "⬇️ Pulling latest staging image..."
          docker pull ghcr.io/${{ github.repository }}:develop
          
          # Stop current container
          echo "🛑 Stopping current containers..."
          docker-compose -f docker-compose.staging.yml down || true
          
          # Update docker-compose to use registry image
          echo "🔄 Updating image reference..."
          sed -i '/build:/,/dockerfile: Dockerfile.staging/c\    image: ghcr.io/${{ github.repository }}:develop' docker-compose.staging.yml
          
          # Start services
          echo "🚀 Starting staging services..."
          docker-compose -f docker-compose.staging.yml up -d
          
          # Wait for container to be ready
          echo "⏳ Waiting for container to be ready..."
          sleep 20
          
          # Verify deployment
          if [ "$(docker ps -q -f name=kraftdo-nfc-staging-web)" ]; then
            echo "✅ Deployment successful!"
            docker logs kraftdo-nfc-staging-web --tail 20
          else
            echo "❌ Deployment failed!"
            docker logs kraftdo-nfc-staging-web
            exit 1
          fi
          
          # Cleanup old images
          echo "🧹 Cleaning up old images..."
          docker image prune -f || true
          
          echo "🎉 KraftDo NFC Staging deployment completed successfully!"
          echo "📱 App available at: http://kraftdo.cl:8084"