name: Deploy KraftDo NFC to VPS

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  tests:
    runs-on: ubuntu-latest
    name: Run Tests
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, mysql, gd, zip, redis, bcmath, exif
        coverage: none
        
    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"
      
    - name: Install Dependencies
      run: composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist
      
    - name: Regenerate autoloader
      run: composer dump-autoload
      
    - name: Generate key
      run: php artisan key:generate
      
    - name: Directory Permissions
      run: chmod -R 777 storage bootstrap/cache
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: Install Node dependencies
      run: npm ci
      
    - name: Build Vite assets
      run: npm run build
        
    - name: Create Database
      run: |
        mkdir -p database
        touch database/database.sqlite
        
    - name: Execute tests (Unit and Feature tests) via Pest
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
      run: vendor/bin/pest --no-coverage

  build:
    needs: tests
    runs-on: ubuntu-latest
    name: Build NFC Image
    if: github.ref == 'refs/heads/develop'
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extract metadata for NFC image
      id: meta-nfc
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/kraftdo-nfc
        tags: |
          type=ref,event=branch
          type=raw,value=latest,enable={{is_default_branch}}
          type=sha,prefix={{branch}}-
    
    - name: Build and push NFC image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: true
        tags: ${{ steps.meta-nfc.outputs.tags }}
        labels: ${{ steps.meta-nfc.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  deploy:
    needs: [tests, build]
    runs-on: ubuntu-latest
    name: Deploy to Staging
    if: github.ref == 'refs/heads/develop'
    
    steps:
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        passphrase: ${{ secrets.VPS_SSH_PASSPHRASE }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          # Create project directory if it doesn't exist
          mkdir -p /root/docker-projects/kraftdo-nfc-staging
          cd /root/docker-projects/kraftdo-nfc-staging
          
          # Initialize git repository if it doesn't exist and pull latest code
          echo "🔄 Updating source code from repository..."
          if [ ! -d ".git" ]; then
            echo "📥 Cloning repository for the first time..."
            git clone https://github.com/${{ github.repository }}.git .
            git checkout develop
          else
            echo "📥 Pulling latest changes..."
            git fetch origin
            git reset --hard origin/develop
          fi
          
          # Download latest docker-compose.staging.yml from repository (backup method)
          echo "📄 Ensuring latest docker-compose configuration..."
          curl -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
               -H "Accept: application/vnd.github.v3.raw" \
               -L "https://api.github.com/repos/${{ github.repository }}/contents/docker-compose.staging.yml?ref=develop" \
               -o docker-compose.staging.yml
          
          # Login to GitHub Container Registry for private image access
          echo "🔑 Logging into GitHub Container Registry..."
          if [ -n "${{ secrets.GHCR_TOKEN }}" ]; then
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u buguenocesar92 --password-stdin
          else
            echo "⚠️  GHCR_TOKEN not found, trying with GITHUB_TOKEN..."
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          fi
          
          # Set environment variables for staging
          echo "🔧 Setting environment variables..."
          export DB_HOST="${{ secrets.DB_HOST }}"
          export DB_DATABASE="${{ secrets.DB_DATABASE }}"
          export DB_USERNAME="${{ secrets.DB_USERNAME }}"
          export DB_PASSWORD="${{ secrets.DB_PASSWORD }}"
          export APP_KEY="${{ secrets.APP_KEY }}"
          export APP_URL="${{ secrets.APP_URL || 'https://staging.kraftdo.cl' }}"
          export ASSET_URL="${{ secrets.ASSET_URL || 'https://staging.kraftdo.cl' }}"
          export LIVEWIRE_ASSET_URL="${{ secrets.LIVEWIRE_ASSET_URL || 'https://staging.kraftdo.cl' }}"
          export SESSION_DOMAIN="${{ secrets.SESSION_DOMAIN || 'staging.kraftdo.cl' }}"
          export SESSION_SECURE_COOKIE="${{ secrets.SESSION_SECURE_COOKIE || 'true' }}"
          
          # Pull latest image (using the pre-built base image)
          echo "⬇️ Pulling latest staging image..."
          docker pull ghcr.io/buguenocesar92/kraftdo-nfc:develop
          
          # Stop current container
          echo "🛑 Stopping current containers..."
          docker-compose -f docker-compose.staging.yml down || true
          
          # Clean problematic directories that might conflict with Docker mounts
          echo "🧹 Cleaning potential mount conflicts..."
          rm -rf public/storage || true
          
          # Verify docker-compose was downloaded
          if [ ! -f "docker-compose.staging.yml" ]; then
            echo "❌ Failed to download docker-compose.staging.yml"
            exit 1
          fi
          echo "✅ Docker-compose configuration updated from repository"
          
          # Debug: Check what REDIS_PORT is being used
          echo "🔍 Debug: Checking REDIS_PORT configuration..."
          echo "REDIS_PORT from environment: ${REDIS_PORT:-not_set}"
          grep -n "REDIS_PORT" docker-compose.staging.yml || echo "No REDIS_PORT found in compose file"
          
          # Start services
          echo "🚀 Starting staging services..."
          docker-compose -f docker-compose.staging.yml up -d
          
          # Wait for container to be ready
          echo "⏳ Waiting for container to be ready..."
          sleep 20
          
          # Verify application is working
          echo "🔧 Verifying application..."
          if ! docker-compose -f docker-compose.staging.yml exec -T web php artisan --version; then
            echo "❌ Laravel application not working"
            docker logs kraftdo-nfc-staging-web --tail 20
            exit 1
          fi
          
          # Run migrations
          echo "🗄️ Running database migrations..."
          if ! docker-compose -f docker-compose.staging.yml exec -T web php artisan migrate --force; then
            echo "❌ Failed to run migrations"
            exit 1
          fi
          
          # Run seeders (optional - uncomment if needed)
          # echo "🌱 Running database seeders..."
          # docker-compose -f docker-compose.staging.yml exec -T web php artisan db:seed --force
          
          # Clear and optimize caches
          echo "🧹 Clearing and optimizing application caches..."
          docker-compose -f docker-compose.staging.yml exec -T web php artisan config:clear
          docker-compose -f docker-compose.staging.yml exec -T web php artisan route:clear
          docker-compose -f docker-compose.staging.yml exec -T web php artisan view:clear
          docker-compose -f docker-compose.staging.yml exec -T web php artisan config:cache
          docker-compose -f docker-compose.staging.yml exec -T web php artisan route:cache
          docker-compose -f docker-compose.staging.yml exec -T web php artisan view:cache
          
          # Create storage link if needed
          echo "🔗 Creating storage link..."
          docker-compose -f docker-compose.staging.yml exec -T web php artisan storage:link || true
          
          # Create and fix admin user
          echo "👤 Creating admin user..."
          docker-compose -f docker-compose.staging.yml exec -T web php artisan admin:create || true
          echo "👤 Fixing admin user privileges..."
          docker-compose -f docker-compose.staging.yml exec -T web php artisan admin:fix || true
          
          # Verify deployment
          if [ "$(docker ps -q -f name=kraftdo-nfc-staging-web)" ]; then
            echo "✅ Deployment successful!"
            echo "📋 Recent application logs:"
            docker logs kraftdo-nfc-staging-web --tail 50
          else
            echo "❌ Deployment failed!"
            docker logs kraftdo-nfc-staging-web
            exit 1
          fi
          
          # Cleanup old images
          echo "🧹 Cleaning up old images..."
          docker image prune -f || true
          
          echo "🎉 KraftDo NFC Staging deployment completed successfully!"
          echo "📱 App available at: https://staging.kraftdo.cl:8081"