name: "🔍 CodeQL Security Analysis"

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Run CodeQL analysis every Tuesday at 6 AM UTC (3 AM Chile time)
    - cron: '0 6 * * 2'

jobs:
  analyze:
    name: 🛡️ Security Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript', 'php' ]

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🔍 Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        # Override default queries to include security-and-quality
        queries: security-and-quality
        # Custom configuration for better PHP analysis
        config-file: ./.github/codeql/codeql-config.yml

    # For PHP analysis, we need to build the project
    - name: 🐘 Setup PHP for CodeQL
      if: matrix.language == 'php'
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.3'
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, mysql, gd, zip
        coverage: none
        
    - name: 📦 Install PHP dependencies for analysis
      if: matrix.language == 'php'
      run: |
        composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
        
    # For JavaScript analysis
    - name: 🟢 Setup Node.js for CodeQL
      if: matrix.language == 'javascript'
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        
    - name: 📦 Install Node dependencies for analysis
      if: matrix.language == 'javascript'
      run: |
        npm ci --prefer-offline --no-audit
        npm run build

    - name: 🔍 Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3
      with:
        category: "/language:${{matrix.language}}"
        # Upload results even if there are findings
        upload: true
        # Set output format for better readability
        output: sarif-and-exit-codes
        
    - name: 📊 Upload CodeQL results to Security tab
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: ${{ runner.temp }}/results/
        
    # Additional security scanning with custom rules
    - name: 🔒 Additional Security Checks
      if: matrix.language == 'php'
      run: |
        # Check for common Laravel security issues
        echo "🔍 Checking for hardcoded secrets..."
        if grep -r "password.*=" --include="*.php" --exclude-dir=vendor . | grep -v "/\*" | grep -v "//" | head -10; then
          echo "⚠️ Potential hardcoded passwords found"
        fi
        
        echo "🔍 Checking for debug mode in production files..."
        if grep -r "APP_DEBUG.*true" --include="*.env*" . | grep -v example; then
          echo "⚠️ Debug mode enabled in production files"
        fi
        
        echo "🔍 Checking for exposed sensitive files..."
        find . -name "*.log" -o -name "*.key" -o -name "*.pem" -not -path "./vendor/*" | head -10
        
    - name: 📈 CodeQL Analysis Summary
      run: |
        echo "## 🛡️ CodeQL Security Analysis Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "- **Language**: ${{ matrix.language }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Status**: ✅ Analysis completed" >> $GITHUB_STEP_SUMMARY  
        echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
        echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Results are available in the [Security tab](https://github.com/${{ github.repository }}/security/code-scanning)." >> $GITHUB_STEP_SUMMARY