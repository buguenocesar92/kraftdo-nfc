name: 🧪 Development CI/CD (Develop)

on:
  push:
    branches: [ develop ]
  pull_request:
    branches: [ develop, main ]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests'
        required: false
        default: false
        type: boolean
      deploy_to_staging:
        description: 'Deploy to staging environment'
        required: false
        default: true
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PHP_VERSION: '8.3'
  NODE_VERSION: '20'

jobs:
  tests:
    runs-on: ubuntu-latest
    name: 🧪 Run Tests & Quality Checks
    if: ${{ !inputs.skip_tests }}
    
    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
    
    - name: 🐘 Setup PHP ${{ env.PHP_VERSION }}
      uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ env.PHP_VERSION }}
        extensions: mbstring, xml, ctype, iconv, intl, pdo_sqlite, mysql, gd, zip, redis, pcov
        coverage: pcov
        ini-values: memory_limit=512M
        
    - name: 📦 Get Composer Cache Directory
      id: composer-cache
      run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT
      
    - name: 🎯 Cache Composer dependencies
      uses: actions/cache@v3
      with:
        path: ${{ steps.composer-cache.outputs.dir }}
        key: ${{ runner.os }}-composer-dev-${{ hashFiles('**/composer.lock') }}
        restore-keys: ${{ runner.os }}-composer-dev-
        
    - name: 📋 Copy .env for testing
      run: |
        cp .env.example .env
        echo "APP_KEY=$(php artisan key:generate --show)" >> .env
        echo "CACHE_DRIVER=redis" >> .env
        echo "SESSION_DRIVER=redis" >> .env
        echo "REDIS_HOST=127.0.0.1" >> .env
      
    - name: 📦 Install Dependencies (Makefile)
      run: make ci-install
      
    - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: 🏗️ Build Assets (Makefile)
      run: make ci-build-assets
        
    - name: 🔧 Setup CI Environment (Makefile)
      run: make ci-setup
        
    - name: 🧪 Run Unit Tests with Coverage (Makefile)
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
        CACHE_DRIVER: array
        SESSION_DRIVER: array
        REDIS_HOST: 127.0.0.1
      run: make ci-test-unit-dev
        
    - name: 🧪 Run Feature Tests (Makefile)
      env:
        DB_CONNECTION: sqlite
        DB_DATABASE: database/database.sqlite
        CACHE_DRIVER: array
        SESSION_DRIVER: array
      run: make ci-test-feature
      
    - name: 📊 Upload Coverage Reports
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: develop
        fail_ci_if_error: false
        
    - name: 🔍 Quality & Security Checks (Makefile)
      run: make ci-quality-full

  build-dev:
    needs: tests
    runs-on: ubuntu-latest
    name: 🏗️ Build Development Image
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
    
    - name: 🐳 Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
        platforms: linux/amd64
        
    - name: 🔐 Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: 🏷️ Extract metadata for development
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,prefix=develop-,format=short
          type=raw,value=develop-latest
          type=raw,value={{date 'YYYYMMDD-HHmmss'}}-develop
        labels: |
          org.opencontainers.image.title=KraftDo NFC Development
          org.opencontainers.image.description=Laravel development build with debugging tools
          org.opencontainers.image.vendor=KraftDo
    
    - name: 🔨 Build and push development image
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile.phpfpm
        push: true
        platforms: linux/amd64
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
        build-args: |
          PHP_VERSION=${{ env.PHP_VERSION }}
          NODE_VERSION=${{ env.NODE_VERSION }}
          APP_ENV=development

  deploy-staging:
    needs: build-dev
    runs-on: ubuntu-latest
    name: 🚀 Deploy to Staging
    if: |
      github.ref == 'refs/heads/develop' && 
      github.event_name == 'push' && 
      (inputs.deploy_to_staging == true || inputs.deploy_to_staging == null)
    environment:
      name: staging
      url: https://staging.kraftdo.cl
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      with:
        sparse-checkout: |
          docker-compose.dev.yml
          .env.example
          Makefile
          docker/
    
    - name: 🚀 Deploy to Staging Server
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.STAGING_HOST }}
        username: ${{ secrets.STAGING_USERNAME }}
        key: ${{ secrets.STAGING_SSH_KEY }}
        passphrase: ${{ secrets.STAGING_SSH_PASSPHRASE }}
        port: ${{ secrets.STAGING_PORT || 22 }}
        command_timeout: 15m
        script: |
          set -e
          
          # Navigate to staging project directory
          STAGING_DIR="${{ secrets.STAGING_PATH || '/opt/kraftdo-nfc-staging' }}"
          echo "📁 Navigating to staging directory: $STAGING_DIR"
          cd $STAGING_DIR
          
          # Pull latest changes
          echo "📥 Pulling latest develop branch..."
          git fetch origin develop
          git reset --hard origin/develop
          
          # Login to GitHub Container Registry
          echo "🔐 Logging into GitHub Container Registry..."
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
          
          # Pull latest development image
          echo "⬇️ Pulling latest development image..."
          docker pull ghcr.io/${{ github.repository }}:develop-latest
          
          # Update docker-compose for development environment
          echo "🔄 Updating docker-compose with registry image..."
          if [ -f "docker-compose.dev.yml" ]; then
            # Replace build configuration with image reference
            sed -i 's|build:|# build:|g' docker-compose.dev.yml
            sed -i 's|context: \\.|# context: .|g' docker-compose.dev.yml
            sed -i 's|dockerfile: Dockerfile\\.phpfpm|# dockerfile: Dockerfile.phpfpm|g' docker-compose.dev.yml
            
            # Add image reference if not present
            if ! grep -q "image: ghcr.io/${{ github.repository }}:develop-latest" docker-compose.dev.yml; then
              sed -i '/php-fpm:/a\    image: ghcr.io/${{ github.repository }}:develop-latest' docker-compose.dev.yml
            fi
          fi
          
          # Stop current containers
          echo "🛑 Stopping current staging containers..."
          docker compose -f docker-compose.dev.yml down --remove-orphans || true
          
          # Start staging environment
          echo "🚀 Starting staging environment..."
          docker compose -f docker-compose.dev.yml up -d
          
          # Wait for services to be ready
          echo "⏳ Waiting for services to be ready..."
          sleep 30
          
          # Run Laravel optimizations for staging
          echo "⚡ Running Laravel optimizations..."
          docker compose -f docker-compose.dev.yml exec php-fpm php artisan config:cache
          docker compose -f docker-compose.dev.yml exec php-fpm php artisan route:cache
          docker compose -f docker-compose.dev.yml exec php-fpm php artisan migrate --force
          
          # Test staging health
          echo "🏥 Testing staging health..."
          if curl -f -s "${{ secrets.STAGING_URL || 'http://localhost:8080' }}/health" > /dev/null; then
            echo "✅ Staging health check passed"
          else
            echo "⚠️ Staging health check failed - verify manually"
          fi
          
          # Show final status
          echo "📊 Staging deployment status:"
          docker compose -f docker-compose.dev.yml ps
          
          echo "🎉 Staging deployment completed successfully!"

  notify:
    needs: [tests, build-dev, deploy-staging]
    runs-on: ubuntu-latest
    name: 📢 Notify Results
    if: always()
    
    steps:
    - name: 📢 Notify on success
      if: ${{ needs.tests.result == 'success' && (needs.build-dev.result == 'success' || needs.build-dev.result == 'skipped') }}
      run: |
        echo "✅ Develop pipeline completed successfully!"
        echo "Tests: ${{ needs.tests.result }}"
        echo "Build: ${{ needs.build-dev.result }}"
        echo "Deploy: ${{ needs.deploy-staging.result }}"
        
    - name: 📢 Notify on failure
      if: ${{ needs.tests.result == 'failure' || needs.build-dev.result == 'failure' || needs.deploy-staging.result == 'failure' }}
      run: |
        echo "❌ Develop pipeline failed!"
        echo "Tests: ${{ needs.tests.result }}"
        echo "Build: ${{ needs.build-dev.result }}"
        echo "Deploy: ${{ needs.deploy-staging.result }}"
        exit 1