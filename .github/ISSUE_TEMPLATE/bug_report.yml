name: 🐛 Bug Report
description: Reportar un bug o problema en KraftDo NFC
title: "[BUG] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Gracias por reportar este bug. Por favor llena la información solicitada para poder ayudarte mejor.

  - type: checkboxes
    id: terms
    attributes:
      label: "✅ Confirmación"
      options:
        - label: He buscado en issues existentes y no encontré uno similar
          required: true
        - label: Este bug es reproducible
          required: true
        - label: He incluido toda la información necesaria
          required: true

  - type: textarea
    id: description
    attributes:
      label: "📝 Descripción del Bug"
      description: "Describe claramente qué está pasando"
      placeholder: "El sistema no permite..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: "✅ Comportamiento Esperado"
      description: "¿Qué debería pasar?"
      placeholder: "Debería permitir..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: "🔄 Pasos para Reproducir"
      description: "¿Cómo podemos reproducir este bug?"
      placeholder: |
        1. Ir a '...'
        2. Hacer clic en '....'
        3. Llenar el campo '....'
        4. Ver el error
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: "🏗️ Entorno"
      description: "¿En qué entorno ocurre el bug?"
      options:
        - Desarrollo (localhost)
        - Staging (staging.kraftdo.cl)
        - Producción (kraftdo.cl)
        - Docker local
        - No estoy seguro
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: "🌐 Navegador"
      options:
        - Chrome
        - Firefox
        - Safari
        - Edge
        - Mobile Safari (iOS)
        - Chrome Mobile (Android)
        - Otro
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: "📋 Logs/Screenshots"
      description: "Agrega logs, screenshots o cualquier información adicional"
      placeholder: "Pega aquí los logs o descripción adicional..."
    validations:
      required: false

  - type: dropdown
    id: severity
    attributes:
      label: "🚨 Severidad"
      description: "¿Qué tan crítico es este bug?"
      options:
        - 🔴 Crítico - Bloquea completamente la funcionalidad
        - 🟡 Alto - Funcionalidad importante no funciona
        - 🟢 Medio - Problema menor que afecta la experiencia
        - 🔵 Bajo - Problema cosmético o edge case
    validations:
      required: true