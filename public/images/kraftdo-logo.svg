<svg width="120" height="40" viewBox="0 0 120 40" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="kraftdoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#84cc16;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle with gradient -->
  <circle cx="20" cy="20" r="16" fill="url(#kraftdoGradient)" />
  
  <!-- K letter in white -->
  <text x="20" y="26" fill="white" text-anchor="middle" font-family="Arial, sans-serif" font-weight="900" font-size="18">K</text>
  
  <!-- KRAFTDO text -->
  <text x="42" y="18" fill="#1f2937" font-family="Arial, sans-serif" font-weight="800" font-size="14" letter-spacing="1px">KRAFTDO</text>
  
  <!-- NFC subtitle -->
  <text x="42" y="30" fill="#22c55e" font-family="Arial, sans-serif" font-weight="600" font-size="10">NFC</text>
</svg>