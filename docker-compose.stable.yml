version: '3.8'

services:
  # ==========================================
  # BACKEND - PHP-FPM (Laravel + Livewire)
  # ==========================================
  php:
    build:
      context: .
      dockerfile: docker/php-fpm/Dockerfile
    container_name: laravel-php-fpm
    restart: unless-stopped
    volumes:
      - .:/var/www/html
    networks:
      - laravel
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=mysql
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=laravel
      - DB_USERNAME=laravel
      - DB_PASSWORD=laravel_password
      - SESSION_DOMAIN=localhost
      - SESSION_SECURE_COOKIE=false
      - SESSION_SAME_SITE=lax
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "php-fpm -t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ==========================================
  # FRONTEND - FrankenPHP (Solo assets + proxy)
  # ==========================================
  frankenphp:
    image: dunglas/frankenphp:php8.3-alpine
    container_name: laravel-frankenphp
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - .:/app
      - ./docker/frankenphp/Caddyfile:/etc/caddy/Caddyfile:ro
    networks:
      - laravel
    depends_on:
      - php
    environment:
      - SERVER_NAME=:80
    command: ["caddy", "run", "--config", "/etc/caddy/Caddyfile", "--adapter", "caddyfile"]

  # ==========================================
  # DATABASE - MySQL 8
  # ==========================================
  mysql:
    image: mysql:8.0
    container_name: laravel-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=laravel
      - MYSQL_USER=laravel
      - MYSQL_PASSWORD=laravel_password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    networks:
      - laravel
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "laravel", "-plaravel_password"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ==========================================
  # REDIS (Opcional para cache/sessions)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: laravel-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - laravel
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
    driver: local

networks:
  laravel:
    driver: bridge